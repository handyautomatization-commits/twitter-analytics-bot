name: Weekly Twitter Analytics Report

on:
  # Every Sunday at 09:00 UTC (9 AM GMT / 10 AM BST)
  schedule:
    - cron: '0 9 * * 0'

  # Ручной запуск для тестирования из вкладки Actions
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Тестовый режим (синтетические данные, без реального scraping)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      dry_run:
        description: 'Dry run (не отправлять в Telegram)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  report:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    permissions:
      contents: write  # нужно для коммита data/ файлов обратно в репо
      secrets: read    # нужно для проверки возраста TWITTER_COOKIES

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Кеш Playwright браузеров
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Установка Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Проверка возраста cookies
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPDATED=$(gh api repos/${{ github.repository }}/actions/secrets/TWITTER_COOKIES --jq '.updated_at' 2>/dev/null || echo "")
          echo "COOKIES_UPDATED_AT=$UPDATED" >> $GITHUB_ENV

      - name: Запуск отчёта
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          COOKIES_UPDATED_AT: ${{ env.COOKIES_UPDATED_AT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry"
          fi
          python main.py $ARGS

      - name: Сохранение данных в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: обновление данных аналитики $(date -u +%Y-%m-%d)"
          git push
