name: Monthly Twitter Analytics Report

on:
  # 1st of every month at 09:00 UTC (9 AM GMT / 10 AM BST)
  schedule:
    - cron: '0 9 1 * *'

  # Ручной запуск для тестирования
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (не отправлять в Telegram)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  monthly-report:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Запуск ежемесячного отчёта
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE }}
        run: |
          ARGS="--monthly"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry"
          fi
          python main.py $ARGS
